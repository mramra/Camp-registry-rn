name: Deploy Web Preview to GitHub Pages

# نشر معاينة ويب سريعة من نفس كود camp-registry-rn — بدون أي بناء APK
# أو انتظار EAS. يشتغل تلقائياً عند كل push، وجاهز خلال دقيقة إلى دقيقتين.
#
# ملاحظة: هذه معاينة سريعة للتجربة والمراجعة، وليست بديلاً عن التطبيق
# الفعلي على الموبايل — بعض المكتبات الأصلية (SecureStore، إلخ) لها
# سلوك مختلف قليلاً على الويب مقابل أندرويد الحقيقي.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-web-preview"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Export web build
        run: npx expo export --platform web

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
